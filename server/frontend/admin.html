<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tmproxy - 管理后台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">tmproxy <span>Admin</span></a>
        <div class="nav-links">
            <a href="/">返回首页</a>
            <button id="changePasswordBtn" class="btn btn-primary">修改密码</button>
            <button onclick="logout()" class="btn btn-danger">退出登录</button>
        </div>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">当前活跃客户端</div>
                <div id="stat-clients" class="value">0</div>
            </div>
            <div class="stat-card">
                <div class="label">活跃 TCP 连接</div>
                <div id="stat-conns" class="value">0</div>
            </div>
            <div class="stat-card" id="totp-floating-container" style="cursor: pointer;">
                <div class="label">实时 TOTP (点击复制)</div>
                <div id="totpCode" class="value" style="color: var(--success);">Loading...</div>
            </div>
            <div class="stat-card">
                <div class="label">系统状态</div>
                <div class="value"><span class="badge badge-success" style="padding: 4px 10px; font-size: 14px;">运行中</span></div>
            </div>
        </div>

        <div class="grid">
            <!-- 客户端管理：宽卡片布局 -->
            <div class="card wide-card">
                <h2>👥 活跃客户端管理</h2>
                <div class="table-container">
                    <table id="clientsTable">
                        <thead>
                            <tr>
                                <th style="width: 200px;">客户端 ID / 用户</th>
                                <th style="width: 150px;">来源地址</th>
                                <th style="width: 150px;">代理用户</th>
                                <th style="width: 180px;">连接时间</th>
                                <th>端口转发规则</th>
                                <th style="width: 200px;">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 由 admin.js 填充 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 连接监控：宽卡片布局 -->
            <div class="card wide-card">
                <h2>⚡ 全局实时 TCP 连接</h2>
                <div class="table-container">
                    <table id="connectionsTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>隧道 ID</th>
                                <th>客户端 ID</th>
                                <th>客户端地址</th>
                                <th>目标地址</th>
                                <th>连接时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 由 admin.js 填充 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 原有 admin.js 依赖的 Modal 结构 -->
    <div id="customModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">提示</h2>
                <span class="close-button">&times;</span>
            </div>
            <p id="modalMessage" class="muted" style="margin-bottom: 20px; font-size: 14px;"></p>
            
            <div class="modal-input-group">
                <input type="text" id="modalInput" style="display:none;">
                <input type="number" id="modalRemotePortInput" placeholder="远程端口 (0=随机)" style="display:none;">
                <input type="text" id="modalLocalAddrInput" placeholder="本地地址 (127.0.0.1:8080)" style="display:none;">
                <input type="password" id="modalOldPasswordInput" placeholder="当前密码" style="display:none;">
                <input type="password" id="modalNewPasswordInput" placeholder="新密码" style="display:none;">
                <input type="password" id="modalConfirmPasswordInput" placeholder="确认新密码" style="display:none;">
            </div>

            <div class="modal-footer">
                <button id="modalCancelBtn" class="btn">取消</button>
                <button id="modalConfirmBtn" class="btn btn-primary">确定</button>
                <button id="modalAlertBtn" class="btn btn-primary" style="display:none;">好的</button>
            </div>
        </div>
    </div>

    <script src="/static/admin.js"></script>
    <script>
        function logout() {
            document.cookie = "admin_session=; path=/; expires=Thu, 01 Jan 1970 00:00:01 GMT;";
            window.location.href = "/admin/login";
        }

        setInterval(async () => {
            try {
                const cRes = await fetch('/api/admin/clients');
                const clients = await cRes.json();
                document.getElementById('stat-clients').textContent = clients.length;

                const nRes = await fetch('/api/admin/connections');
                const conns = await nRes.json();
                document.getElementById('stat-conns').textContent = conns.length;
            } catch(e) {}
        }, 5000);
    </script>
</body>
</html>
